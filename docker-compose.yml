services:
  orderapi:
    build: ./backend
    container_name: orderapi-container
    ports:
      - "${BACKEND_PORT}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - AllowedOrigins=${ALLOWED_ORIGINS}
    networks:
      - order-network

  frontend:
    build: ./frontend
    container_name: frontend-container
    ports:
      - "${FRONTEND_PORT}:3000"
    environment:
      - VITE_API_URL=${VITE_API_URL}
      - HOST=0.0.0.0
    networks:
      - order-network
    depends_on:
      - orderapi

networks:
  order-network:
    driver: bridge
